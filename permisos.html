<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Permisos - Grupo Aurica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        /* Estilos específicos de permisos.html */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }

        td.email-cell { text-align: left; }
        .btn-save { background: transparent; border: 1px solid var(--ok-color); color: var(--ok-color); padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; width: auto;}
        .btn-save:hover { background: var(--ok-color); color: white;}
        
        .action-cell { display: flex; gap: 5px; justify-content: center; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-left">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>
        <div>
            <h2>Gestión de Accesos por Módulo</h2>
            <p style="margin: 3px 0 0 0; font-size: 13px; opacity: 0.9;">Control de permisos corporativos mediante Entra ID</p>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-primary" onclick="window.location.href='admin.html'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
            Volver a Admin
        </button>
        <button class="btn-primary" onclick="window.location.href='index.html'" style="background: rgba(255,255,255,0.2); color: white;">
            Panel Principal
        </button>
    </div>
</div>

<div class="grid-layout">
    
    <div class="card">
        <h3>➕ Nuevo Usuario</h3>
        <form id="formPermisos">
            <div class="form-group">
                <label>Correo Electrónico Corporativo</label>
                <input type="email" id="u_email" required placeholder="usuario@auricasac.com">
            </div>
            
            <label style="display: block; margin: 15px 0 10px 0; font-weight: 800; font-size: 12px; color: var(--text-dark);">Seleccionar Módulos Permitidos</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" id="chk_dash"> Dashboard</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_mante"> Gestión Flota</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_garita"> Garita</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_teso"> Tesorería</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_admin"> Administración</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_siniestros"> Siniestros</label>
                <label class="checkbox-item"><input type="checkbox" id="chk_conta"> Contabilidad</label>
            </div>
            
            <label style="display: block; margin: 15px 0 10px 0; font-weight: 800; font-size: 12px; color: var(--crit-color);">Alertas de Vencimiento</label>
            <div class="checkbox-group" style="margin-bottom: 20px;">
                <label class="checkbox-item" style="color:var(--crit-color);"><input type="checkbox" id="chk_alertas"> Recibe Correos de Alerta (15 días)</label>
            </div>
            
            <button type="submit" id="btnGuardar">Registrar Accesos</button>
        </form>
    </div>

    <div class="card">
        <h3>📋 Matriz de Accesos Autorizados</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Usuario / Email</th>
                        <th>Dashboard</th>
                        <th>Flota</th>
                        <th>Garita</th>
                        <th>Tesoreria</th>
                        <th>Admin</th>
                        <th>Siniestros</th>
                        <th>Conta</th>
                        <th style="color:var(--crit-color);">Alertas Email</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaPermisos">
                    <tr><td colspan="9" style="text-align: center;">Cargando base de datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // 🔒 GUARD: Verificar sesión activa y permisos de SUPER ADMIN
    const sessionStr = sessionStorage.getItem('flotapro_session');
    let sessionData = null;
    if (sessionStr) {
        sessionData = JSON.parse(sessionStr);
    }
    
    const SUPER_ADMINS = ['ti@metalabsac.com', 'mpalva@metalabsac.com'];
    
    if(!sessionData || (Date.now() - sessionData.timestamp > 28800000)) {
        sessionStorage.removeItem('flotapro_session');
        window.location.href='index.html';
    } else if (!SUPER_ADMINS.includes(sessionData.email)) {
        alert("Acceso denegado: Privilegios insuficientes.");
        window.location.href='index.html';
    }

    const API_URL = "https://flota-backend-xecu.onrender.com";

    async function cargarPermisos() {
        try {
            const res = await fetch(`${API_URL}/permisos`);
            const data = await res.json();
            const tbody = document.getElementById('tablaPermisos');
            tbody.innerHTML = '';

            if(data.status === "success" && data.data.length > 0) {
                data.data.forEach(p => {
                    tbody.innerHTML += `
                        <tr id="row_${p.id}">
                            <td class="email-cell">${p.email}</td>
                            <td><input type="checkbox" id="mod_dash_${p.id}" ${p.mod_dashboard ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_mante_${p.id}" ${p.mod_mantenimiento ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_garita_${p.id}" ${p.mod_garita ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_teso_${p.id}" ${p.mod_tesoreria ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_admin_${p.id}" ${p.mod_admin ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_sinies_${p.id}" ${p.mod_siniestros ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_conta_${p.id}" ${p.mod_conta ? 'checked' : ''}></td>
                            <td><input type="checkbox" id="mod_alertas_${p.id}" ${p.recibe_alertas ? 'checked' : ''}></td>
                            <td class="action-cell">
                                <button class="btn-save" onclick="actualizarPermiso('${p.id}')" title="Guardar Cambios">💾</button>
                                <button class="btn-delete" onclick="eliminarPermiso('${p.id}', '${p.email}')" title="Revocar Acceso">❌</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">No hay usuarios registrados. Agregue uno.</td></tr>';
            }
        } catch(e) { 
            console.error(e); 
            document.getElementById('tablaPermisos').innerHTML = '<tr><td colspan="10" style="text-align:center; color:red;">Error de conexión. Es posible que la tabla "usuarios_permisos" no exista en Supabase.</td></tr>';
        }
    }

    document.getElementById('formPermisos').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "Registrando...";

        const payload = {
            email: document.getElementById('u_email').value.toLowerCase(),
            mod_dashboard: document.getElementById('chk_dash').checked,
            mod_mantenimiento: document.getElementById('chk_mante').checked,
            mod_garita: document.getElementById('chk_garita').checked,
            mod_tesoreria: document.getElementById('chk_teso').checked,
            mod_admin: document.getElementById('chk_admin').checked,
            mod_siniestros: document.getElementById('chk_siniestros').checked,
            mod_conta: document.getElementById('chk_conta').checked,
            recibe_alertas: document.getElementById('chk_alertas').checked
        };

        try {
            const res = await fetch(`${API_URL}/permisos`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            
            if (res.ok) {
                document.getElementById('formPermisos').reset();
                cargarPermisos();
                alert("Usuario y accesos registrados exitosamente.");
            } else {
                const error = await res.json();
                alert("Error: " + (error.detail || "No se pudo registrar."));
            }
        } catch (error) { 
            alert("Error de conexión. Compruebe que la tabla usuarios_permisos exista en Supabase."); 
        } finally { 
            btn.innerText = "Registrar Accesos"; 
        }
    });

    async function actualizarPermiso(id) {
        const payload = {
            id: id,
            mod_dashboard: document.getElementById(`mod_dash_${id}`).checked,
            mod_mantenimiento: document.getElementById(`mod_mante_${id}`).checked,
            mod_garita: document.getElementById(`mod_garita_${id}`).checked,
            mod_tesoreria: document.getElementById(`mod_teso_${id}`).checked,
            mod_admin: document.getElementById(`mod_admin_${id}`).checked,
            mod_siniestros: document.getElementById(`mod_sinies_${id}`).checked,
            mod_conta: document.getElementById(`mod_conta_${id}`).checked,
            recibe_alertas: document.getElementById(`mod_alertas_${id}`).checked
        };

        try {
            const res = await fetch(`${API_URL}/permisos`, { 
                method: 'PATCH', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            
            if(res.ok) {
                alert("Permisos actualizados correctamente.");
            } else {
                alert("Error al actualizar permisos.");
            }
        } catch(e) {
            alert("Error de conexión.");
        }
    }

    async function eliminarPermiso(id, email) {
        if(confirm(`¿Estás seguro de revocar todo acceso al usuario ${email}?`)) {
            try {
                const res = await fetch(`${API_URL}/permisos/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    cargarPermisos();
                } else {
                    alert("Error al revocar acceso.");
                }
            } catch(e) {
                alert("Error de conexión.");
            }
        }
    }

    // Inicializar
    cargarPermisos();
</script>

</body>
</html>
