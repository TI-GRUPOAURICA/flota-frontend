<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garita de Control - Grupo Aurica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --aurica-blue: #305da0; --aurica-bg: #eceded; --text-dark: #2c3e50; --ok-color: #2ecc71; --crit-color: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background: var(--aurica-bg); margin: 0; padding: 20px; color: var(--text-dark); }
        
        .top-bar { display: flex; align-items: center; gap: 15px; background: var(--aurica-blue); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; max-width: 1200px; margin: 0 auto 25px auto; box-shadow: 0 4px 10px rgba(48, 93, 160, 0.2);}
        .top-bar h2 { margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase;}
        .top-bar p { margin: 3px 0 0 0; font-size: 13px; opacity: 0.9;}

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1200px; margin: auto; }
        
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .card h3 { margin-top: 0; color: var(--aurica-blue); border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; font-weight: 900; display: flex; align-items: center; gap: 10px;}
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 800; color: var(--text-dark); font-size: 12px; text-transform: uppercase;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; font-size: 14px;}
        input:focus, select:focus { border-color: var(--aurica-blue); outline: none;}

        button { background: var(--aurica-blue); color: white; border: none; padding: 15px; width: 100%; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 15px;}
        button:hover { background: #264b82; }
        .btn-retorno { background: #27ae60; }
        .btn-retorno:hover { background: #219653; }

        /* Estilos del Checklist */
        .checklist-box { background: #f8fbff; border: 1px solid #cce0ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .checklist-box h4 { margin: 0 0 10px 0; font-size: 13px; color: var(--aurica-blue); font-weight: 800;}
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: white; padding: 8px; border-radius: 6px; border: 1px solid #eee; transition: 0.2s;}
        .check-item:hover { border-color: var(--aurica-blue); }
        .check-item input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--aurica-blue); transform: scale(1.2);}

        /* Alerta de Error */
        .alerta-error { display: none; background: #fdeaea; color: var(--crit-color); padding: 15px; border-radius: 8px; font-weight: 800; font-size: 13px; margin-bottom: 15px; border-left: 5px solid var(--crit-color);}
    </style>
</head>
<body>

<div class="top-bar">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    <div>
        <h2>Control de Garita</h2>
        <p>Registro de Salidas y Retornos de Flota</p>
    </div>
</div>

<div class="grid-layout">
    
    <div class="card">
        <h3>🚀 Registrar Salida</h3>
        
        <div id="alerta-salida" class="alerta-error"></div>

        <form id="formSalida">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Vehículo a despachar</label>
                <select id="s_vehiculo" required><option value="">Cargando...</option></select>
            </div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Conductor Autorizado</label>
                <select id="s_conductor" required><option value="">Cargando conductores...</option></select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Kilometraje Actual</label>
                    <input type="number" id="s_km" required placeholder="Ej. 125000">
                </div>
                <div class="form-group">
                    <label>Combustible (%)</label>
                    <input type="number" id="s_combustible" required placeholder="Ej. 100" min="0" max="100">
                </div>
            </div>

            <div class="checklist-box">
                <h4>📋 Checklist de Inspección (Desmarcar si hay daños)</h4>
                <div class="checklist-grid" id="checklist_salida">
                    <label class="check-item"><input type="checkbox" id="chk_s_brisas" checked> Parabrisas</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_parachoques" checked> Parachoques</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_llantas" checked> Llantas</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_puertas" checked> Puertas</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_luces" checked> Luces</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_bocina" checked> Bocina</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_maletero" checked> Maletero</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_lunas" checked> Lunas</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_limpieza" checked> Limpieza</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_guardafangos" checked> Guardafangos</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_capo" checked> Capó</label>
                    <label class="check-item"><input type="checkbox" id="chk_s_cinturon" checked> Cinturones</label>
                </div>
            </div>

            <div class="form-group">
                <label>Observaciones o destino</label>
                <textarea id="s_obs" rows="2" placeholder="Destino, motivo del viaje, etc."></textarea>
            </div>

            <button type="submit" id="btnSalida">Dar Salida de Garita</button>
        </form>
    </div>

    <div class="card">
        <h3>🏁 Registrar Retorno</h3>
        <form id="formRetorno">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Seleccione el Viaje Abierto</label>
                <select id="r_viaje" required onchange="vincularVehiculoRetorno()"><option value="">Cargando...</option></select>
                <input type="hidden" id="r_vehiculo_id">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Kilometraje de Llegada</label>
                    <input type="number" id="r_km" required placeholder="Ej. 125150">
                </div>
                <div class="form-group">
                    <label>Combustible a la llegada (%)</label>
                    <input type="number" id="r_combustible" required placeholder="Ej. 85" min="0" max="100">
                </div>
            </div>

            <div class="checklist-box" style="background: #fff8f8; border-color: #ffcccc;">
                <h4 style="color: var(--crit-color);">🚨 Reporte de Novedades (Desmarcar si hubo daños en ruta)</h4>
                <div class="checklist-grid" id="checklist_retorno">
                    <label class="check-item"><input type="checkbox" id="chk_r_brisas" checked> Parabrisas</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_parachoques" checked> Parachoques</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_llantas" checked> Llantas</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_puertas" checked> Puertas</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_luces" checked> Luces</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_bocina" checked> Bocina</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_maletero" checked> Maletero</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_lunas" checked> Lunas</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_limpieza" checked> Limpieza</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_guardafangos" checked> Guardafangos</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_capo" checked> Capó</label>
                    <label class="check-item"><input type="checkbox" id="chk_r_cinturon" checked> Cinturones</label>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; background: #fff5e6; padding: 15px; border-radius: 8px; border: 1px solid #ffd8a8;">
                <input type="checkbox" id="r_gastos" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--warn-color);">
                <label style="margin:0; font-size: 13px; color: #d35400;">¿El conductor trajo boletas de gastos? (Peaje, cochera, etc.)</label>
            </div>

            <div class="form-group">
                <label>Observaciones de Llegada (Novedades)</label>
                <textarea id="r_obs" rows="2" placeholder="Detalle fallas, problemas en ruta o motivos del gasto..."></textarea>
            </div>

            <button type="submit" class="btn-retorno" id="btnRetorno">Registrar Retorno a Base</button>
        </form>
    </div>

</div>

<script>
    const API_URL = "https://flota-backend-xecu.onrender.com"; // Asegúrate de que esta sea la de Render
    let viajesAbiertos = [];

    async function cargarConductores() {
        try {
            const res = await fetch(`${API_URL}/conductores-autorizados`);
            const data = await res.json();
            const select = document.getElementById('s_conductor');
            select.innerHTML = '<option value="">Seleccione al conductor...</option>';
            data.data.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.nombre} (Brevete: ${c.brevete})</option>`;
            });
        } catch(e) { console.error("Error cargando conductores"); }
    }

    async function cargarVehiculos() {
        try {
            const res = await fetch(`${API_URL}/vehiculos-activos`);
            const data = await res.json();
            const select = document.getElementById('s_vehiculo');
            select.innerHTML = '<option value="">Seleccione vehículo en base...</option>';
            data.data.forEach(v => {
    // Usamos doble igual (==) para evitar problemas de formato de texto/número
    if(v.cr596_estadooperativo == 144280000) {
        select.innerHTML += `<option value="${v.cr596_flota_vehiculoid}">[${v.cr596_placa}] - ${v.cr596_nombre}</option>`;
    }
})
        } catch(e) { console.error("Error vehículos"); }
    }

    async function cargarViajes() {
        try {
            const res = await fetch(`${API_URL}/viajes-abiertos`);
            const data = await res.json();
            viajesAbiertos = data.data;
            const select = document.getElementById('r_viaje');
            select.innerHTML = '<option value="">Seleccione viaje en curso...</option>';
            viajesAbiertos.forEach(v => {
                select.innerHTML += `<option value="${v.cr596_flota_movimientoid}">${v.cr596_nombre} (Salió con: ${v.cr596_kmsalida} km)</option>`;
            });
        } catch(e) { console.error("Error viajes"); }
    }

    function vincularVehiculoRetorno() {
        const viajeId = document.getElementById('r_viaje').value;
        const viaje = viajesAbiertos.find(v => v.cr596_flota_movimientoid === viajeId);
        if(viaje) { document.getElementById('r_vehiculo_id').value = viaje._cr596_vehiculo_value; }
    }

    // --- ENVIAR SALIDA ---
    document.getElementById('formSalida').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalida');
        const alerta = document.getElementById('alerta-salida');
        btn.innerText = "Procesando...";
        alerta.style.display = 'none';

        const payload = {
            vehiculo_id: document.getElementById('s_vehiculo').value,
            conductor_id: document.getElementById('s_conductor').value,
            km_salida: parseInt(document.getElementById('s_km').value),
            combustible_salida: parseInt(document.getElementById('s_combustible').value),
            observaciones: document.getElementById('s_obs').value,
            // Lectura del checklist
            chk_brisas: document.getElementById('chk_s_brisas').checked,
            chk_parachoques: document.getElementById('chk_s_parachoques').checked,
            chk_llantas: document.getElementById('chk_s_llantas').checked,
            chk_puertas: document.getElementById('chk_s_puertas').checked,
            chk_luces: document.getElementById('chk_s_luces').checked,
            chk_bocina: document.getElementById('chk_s_bocina').checked,
            chk_maletero: document.getElementById('chk_s_maletero').checked,
            chk_lunas: document.getElementById('chk_s_lunas').checked,
            chk_limpieza: document.getElementById('chk_s_limpieza').checked,
            chk_guardafangos: document.getElementById('chk_s_guardafangos').checked,
            chk_capo: document.getElementById('chk_s_capo').checked,
            chk_cinturon: document.getElementById('chk_s_cinturon').checked
        };

        try {
            const res = await fetch(`${API_URL}/registrar-salida`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            
            if (res.ok) {
                alert("✅ Vehículo despachado exitosamente.");
                document.getElementById('formSalida').reset();
                cargarVehiculos(); cargarViajes();
            } else {
                // Manejar la alerta del brevete vencido o errores del backend
                const errorData = await res.json();
                alerta.innerText = errorData.detail || "Error en el servidor";
                alerta.style.display = 'block';
            }
        } catch (error) { alert("Error de conexión"); }
        finally { btn.innerText = "Dar Salida de Garita"; }
    });

    // --- ENVIAR RETORNO ---
    document.getElementById('formRetorno').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnRetorno');
        btn.innerText = "Procesando...";

        const payload = {
            movimiento_id: document.getElementById('r_viaje').value,
            vehiculo_id: document.getElementById('r_vehiculo_id').value,
            km_retorno: parseInt(document.getElementById('r_km').value),
            combustible_retorno: parseInt(document.getElementById('r_combustible').value),
            reporta_gastos: document.getElementById('r_gastos').checked,
            observaciones_retorno: document.getElementById('r_obs').value,
            estado_llegada: 144280000, // Por defecto asume que llega Disponible
            // Lectura del checklist
            chk_brisas: document.getElementById('chk_r_brisas').checked,
            chk_parachoques: document.getElementById('chk_r_parachoques').checked,
            chk_llantas: document.getElementById('chk_r_llantas').checked,
            chk_puertas: document.getElementById('chk_r_puertas').checked,
            chk_luces: document.getElementById('chk_r_luces').checked,
            chk_bocina: document.getElementById('chk_r_bocina').checked,
            chk_maletero: document.getElementById('chk_r_maletero').checked,
            chk_lunas: document.getElementById('chk_r_lunas').checked,
            chk_limpieza: document.getElementById('chk_r_limpieza').checked,
            chk_guardafangos: document.getElementById('chk_r_guardafangos').checked,
            chk_capo: document.getElementById('chk_r_capo').checked,
            chk_cinturon: document.getElementById('chk_r_cinturon').checked
        };

        // Si el vigilante desmarca cualquier cosa, el sistema asume que llegó Inoperativo (Para que Mantenimiento revise)
        if (!payload.chk_brisas || !payload.chk_llantas || !payload.chk_luces || !payload.chk_bocina) {
            payload.estado_llegada = 144280002; // Inoperativo / Taller
        }

        try {
            const res = await fetch(`${API_URL}/registrar-retorno`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) {
                alert("🏁 Retorno registrado. Incidentes automáticos generados si hubo desmarques.");
                document.getElementById('formRetorno').reset();
                cargarVehiculos(); cargarViajes();
            } else { alert("Error al registrar retorno"); }
        } catch (error) { alert("Error de conexión"); }
        finally { btn.innerText = "Registrar Retorno a Base"; }
    });

    // Iniciar
    cargarVehiculos();
    cargarViajes();
    cargarConductores();
</script>

</body>
</html>
