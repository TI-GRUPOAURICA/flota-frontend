<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garita de Control - Grupo Aurica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --aurica-blue: #305da0; --aurica-bg: #eceded; --text-dark: #2c3e50; --ok-color: #27ae60; --crit-color: #e74c3c; --warn-color: #f39c12; }
        body { font-family: 'Montserrat', sans-serif; background: var(--aurica-bg); margin: 0; padding: 20px; color: var(--text-dark); }
        
        .top-bar { display: flex; align-items: center; gap: 15px; background: var(--aurica-blue); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; max-width: 1200px; margin: 0 auto 25px auto; box-shadow: 0 4px 10px rgba(48, 93, 160, 0.2);}
        .top-bar h2 { margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase;}
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1200px; margin: auto; }
        
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .card h3 { margin-top: 0; color: var(--aurica-blue); border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; font-weight: 900; display: flex; align-items: center; gap: 10px;}
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 800; color: var(--text-dark); font-size: 12px; text-transform: uppercase;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; font-size: 14px;}
        input:focus, select:focus { border-color: var(--aurica-blue); outline: none;}

        button.btn-submit { background: var(--aurica-blue); color: white; border: none; padding: 15px; width: 100%; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 15px;}
        button.btn-submit:hover { background: #264b82; }
        .btn-retorno { background: #27ae60 !important; }
        .btn-retorno:hover { background: #219653 !important; }

        .checklist-box { background: #f8fbff; border: 1px solid #cce0ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .checklist-box h4 { margin: 0 0 10px 0; font-size: 13px; color: var(--aurica-blue); font-weight: 800;}
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .check-item { display: flex; align-items: center; justify-content: center; padding: 10px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: 0.2s; user-select: none; text-align: center; border: 2px solid transparent;}
        .check-item.ok { background: #e8f8f5; color: var(--ok-color); border-color: #a3e4d7; }
        .check-item.falla { background: #fdeaea; color: var(--crit-color); border-color: #f5b7b1; }
        .alerta-error { display: none; background: #fdeaea; color: var(--crit-color); padding: 15px; border-radius: 8px; font-weight: 800; font-size: 13px; margin-bottom: 15px; border-left: 5px solid var(--crit-color);}
    </style>
</head>
<body>

<div class="top-bar">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    <div>
        <h2>Control de Garita</h2>
        <p>Registro de Salidas y Retornos de Flota</p>
    </div>
</div>

<div class="grid-layout">
    
    <!-- PANEL DE SALIDA -->
    <div class="card">
        <h3>🚀 Registrar Salida</h3>
        <div id="alerta-salida" class="alerta-error"></div>
        <form id="formSalida">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Vehículo a despachar</label>
                <select id="s_vehiculo" required onchange="autocompletarKilometraje()"><option value="">Cargando...</option></select>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Conductor Autorizado</label>
                <select id="s_conductor" required><option value="">Cargando...</option></select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Kilometraje Actual</label>
                    <input type="number" id="s_km" required placeholder="Seleccione auto...">
                </div>
                <div class="form-group">
                    <label>Nivel de Combustible</label>
                    <select id="s_combustible" required>
                        <option value="">Seleccione...</option>
                        <option value="10">🔴 Reserva (10%)</option>
                        <option value="25">🟠 1/4 Tanque (25%)</option>
                        <option value="50">🟡 Medio Tanque (50%)</option>
                        <option value="75">🟢 3/4 Tanque (75%)</option>
                        <option value="100">🟢 Tanque Lleno (100%)</option>
                    </select>
                </div>
            </div>
            <div class="checklist-box">
                <h4>📋 Checklist de Inspección (Clic para marcar falla)</h4>
                <div class="checklist-grid" id="grid_salida"></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Punto de Origen / Sede</label>
                    <select id="s_origen" required onchange="toggleOrigenEspecifico()">
                        <option value="">Seleccione origen...</option>
                        <option value="Sede Olavide">Sede Olavide</option>
                        <option value="Sede Trapiche">Sede Trapiche</option>
                        <option value="Planta Chala">Planta Chala</option>
                        <option value="Otros">⚠️ OTROS (Especificar)</option>
                    </select>
                </div>
                <div class="form-group" id="caja_origen_detalle" style="display: none;">
                    <label style="color: var(--warn-color);">Dirección de Origen</label>
                    <input type="text" id="s_origen_detalle" placeholder="Ej. Casa Conductor">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Destino Autorizado</label>
                    <input type="text" id="s_destino" required placeholder="Ej. Banco, Mina...">
                </div>
                <div class="form-group">
                    <label>Observaciones (Opcional)</label>
                    <input type="text" id="s_obs" placeholder="Novedades menores...">
                </div>
            </div>
            <button type="submit" class="btn-submit" id="btnSalida">Dar Salida de Garita</button>
        </form>
    </div>

    <!-- PANEL DE RETORNO -->
    <div class="card">
        <h3>🏁 Registrar Retorno</h3>
        <form id="formRetorno">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Seleccione el Viaje Abierto</label>
                <select id="r_viaje" required onchange="vincularVehiculoRetorno()"><option value="">Cargando viajes...</option></select>
                <input type="hidden" id="r_vehiculo_id">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Kilometraje de Llegada</label>
                    <input type="number" id="r_km" required placeholder="Ej. 125150">
                </div>
                <div class="form-group">
                    <label>Combustible a la llegada</label>
                    <select id="r_combustible" required>
                        <option value="">Seleccione...</option>
                        <option value="10">🔴 Reserva (10%)</option>
                        <option value="25">🟠 1/4 Tanque (25%)</option>
                        <option value="50">🟡 Medio Tanque (50%)</option>
                        <option value="75">🟢 3/4 Tanque (75%)</option>
                        <option value="100">🟢 Tanque Lleno (100%)</option>
                    </select>
                </div>
            </div>
            <div class="checklist-box" style="background: #fff8f8; border-color: #ffcccc;">
                <h4 style="color: var(--crit-color);">🚨 Reporte de Daños (Clic si llegó con fallas)</h4>
                <div class="checklist-grid" id="grid_retorno"></div>
            </div>

            <!-- BOTÓN DE AVERÍA MEJORADO CON CAJA CONDICIONAL -->
            <div class="form-group" style="margin-bottom: 15px; background: #fdeaea; padding: 15px; border-radius: 8px; border: 1px solid #f5b7b1;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="r_taller" onchange="toggleMotivoTaller()" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--crit-color);">
                    <label style="margin:0; font-size: 13px; color: var(--crit-color); font-weight: 900;">⚠️ ENVIAR A TALLER (Reportar avería mecánica)</label>
                </div>
                <div id="caja_motivo_taller" style="display: none; margin-top: 15px;">
                    <label style="color: var(--crit-color);">Detalle la falla para el Jefe de Mantenimiento:</label>
                    <input type="text" id="r_motivo_taller" placeholder="Ej. Llanta reventada, motor recalentado..." style="border-color: #f5b7b1;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; background: #fff5e6; padding: 15px; border-radius: 8px; border: 1px solid #ffd8a8;">
                <input type="checkbox" id="r_gastos" onchange="toggleGastos()" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--warn-color);">
                <label style="margin:0; font-size: 13px; color: #d35400;">¿Trajo boletas de gastos? (Peaje, cochera)</label>
            </div>
            <div class="form-row">
                <div class="form-group" id="caja_gastos" style="display: none;">
                    <label style="color: var(--warn-color);">Detalle del Gasto</label>
                    <input type="text" id="r_detalle_gastos" placeholder="Ej. Peaje S/16.00">
                </div>
                <div class="form-group">
                    <label>Novedades de la Ruta / Viaje</label>
                    <input type="text" id="r_obs" placeholder="Problemas de ruta, demoras...">
                </div>
            </div>

            <button type="submit" class="btn-submit btn-retorno" id="btnRetorno">Registrar Retorno a Base</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://flota-backend-xecu.onrender.com";
    let memoriaVehiculos = [];
    let viajesAbiertos = [];

    const partesVehiculo = [
        { id: 'brisas', nombre: 'Parabrisas' }, { id: 'parachoques', nombre: 'Parachoques' },
        { id: 'llantas', nombre: 'Llantas' }, { id: 'puertas', nombre: 'Puertas' },
        { id: 'luces', nombre: 'Luces' }, { id: 'bocina', nombre: 'Bocina' },
        { id: 'maletero', nombre: 'Maletero' }, { id: 'lunas', nombre: 'Lunas' },
        { id: 'limpieza', nombre: 'Limpieza' }, { id: 'guardafangos', nombre: 'Guardafangos' },
        { id: 'capo', nombre: 'Capó' }, { id: 'cinturon', nombre: 'Cinturones' }
    ];

    function generarGridChecklist(contenedorId, prefijo) {
        const contenedor = document.getElementById(contenedorId);
        contenedor.innerHTML = '';
        partesVehiculo.forEach(parte => {
            const div = document.createElement('div');
            div.className = 'check-item ok';
            div.id = `chk_${prefijo}_${parte.id}`;
            div.dataset.estado = 'true';
            div.innerHTML = `✅ ${parte.nombre}`;
            div.onclick = function() {
                if (this.dataset.estado === 'true') {
                    this.dataset.estado = 'false';
                    this.className = 'check-item falla';
                    this.innerHTML = `❌ ${parte.nombre}`;
                } else {
                    this.dataset.estado = 'true';
                    this.className = 'check-item ok';
                    this.innerHTML = `✅ ${parte.nombre}`;
                }
            };
            contenedor.appendChild(div);
        });
    }

    generarGridChecklist('grid_salida', 's');
    generarGridChecklist('grid_retorno', 'r');

    function toggleGastos() {
        const check = document.getElementById('r_gastos').checked;
        document.getElementById('caja_gastos').style.display = check ? 'block' : 'none';
    }

    function toggleOrigenEspecifico() {
        const origenSeleccionado = document.getElementById('s_origen').value;
        const cajaDetalle = document.getElementById('caja_origen_detalle');
        if(origenSeleccionado === 'Otros') {
            cajaDetalle.style.display = 'block';
            document.getElementById('s_origen_detalle').required = true;
        } else {
            cajaDetalle.style.display = 'none';
            document.getElementById('s_origen_detalle').required = false;
            document.getElementById('s_origen_detalle').value = '';
        }
    }

    function toggleMotivoTaller() {
        const check = document.getElementById('r_taller').checked;
        const caja = document.getElementById('caja_motivo_taller');
        if(check) {
            caja.style.display = 'block';
            document.getElementById('r_motivo_taller').required = true;
        } else {
            caja.style.display = 'none';
            document.getElementById('r_motivo_taller').required = false;
            document.getElementById('r_motivo_taller').value = '';
        }
    }

    async function cargarConductores() {
        try {
            const res = await fetch(`${API_URL}/conductores-autorizados`);
            const data = await res.json();
            const select = document.getElementById('s_conductor');
            select.innerHTML = '<option value="">Seleccione al conductor...</option>';
            data.data.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.nombre} (Brevete: ${c.brevete})</option>`; });
        } catch(e) {}
    }

    async function cargarVehiculos() {
        try {
            const res = await fetch(`${API_URL}/vehiculos-activos`);
            const data = await res.json();
            memoriaVehiculos = data.data; 
            const select = document.getElementById('s_vehiculo');
            select.innerHTML = '<option value="">Seleccione vehículo en base...</option>';
            memoriaVehiculos.forEach(v => {
                if(v.cr596_estadooperativo == 144280000) { select.innerHTML += `<option value="${v.cr596_flota_vehiculoid}">[${v.cr596_placa}] - ${v.cr596_nombre}</option>`; }
            });
        } catch(e) {}
    }

    function autocompletarKilometraje() {
        const id = document.getElementById('s_vehiculo').value;
        const auto = memoriaVehiculos.find(v => v.cr596_flota_vehiculoid === id);
        document.getElementById('s_km').value = auto ? auto.cr596_kilometrajeactual : "";
    }

    async function cargarViajes() {
        try {
            const res = await fetch(`${API_URL}/viajes-abiertos`);
            const data = await res.json();
            viajesAbiertos = data.data;
            const select = document.getElementById('r_viaje');
            select.innerHTML = '<option value="">Seleccione viaje en curso...</option>';
            viajesAbiertos.forEach(v => { 
                let auto = memoriaVehiculos.find(x => x.cr596_flota_vehiculoid === v._cr596_vehiculo_value);
                let placa = auto ? auto.cr596_placa : 'S/P';
                select.innerHTML += `<option value="${v.cr596_flota_movimientoid}">[${placa}] - ${v.cr596_nombre} (Salió: ${v.cr596_kmsalida} km)</option>`; 
            });
        } catch(e) {}
    }

    function vincularVehiculoRetorno() {
        const id = document.getElementById('r_viaje').value;
        const viaje = viajesAbiertos.find(v => v.cr596_flota_movimientoid === id);
        if(viaje) { document.getElementById('r_vehiculo_id').value = viaje._cr596_vehiculo_value; }
    }

    document.getElementById('formSalida').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalida'); btn.innerText = "Procesando...";
        const payload = {
            vehiculo_id: document.getElementById('s_vehiculo').value,
            conductor_id: document.getElementById('s_conductor').value,
            km_salida: parseInt(document.getElementById('s_km').value),
            combustible_salida: parseInt(document.getElementById('s_combustible').value),
            origen: document.getElementById('s_origen').value,
            origen_detalle: document.getElementById('s_origen_detalle').value,
            destino: document.getElementById('s_destino').value,
            observaciones: document.getElementById('s_obs').value,
            chk_brisas: document.getElementById('chk_s_brisas').dataset.estado === 'true',
            chk_parachoques: document.getElementById('chk_s_parachoques').dataset.estado === 'true',
            chk_llantas: document.getElementById('chk_s_llantas').dataset.estado === 'true',
            chk_puertas: document.getElementById('chk_s_puertas').dataset.estado === 'true',
            chk_luces: document.getElementById('chk_s_luces').dataset.estado === 'true',
            chk_bocina: document.getElementById('chk_s_bocina').dataset.estado === 'true',
            chk_maletero: document.getElementById('chk_s_maletero').dataset.estado === 'true',
            chk_lunas: document.getElementById('chk_s_lunas').dataset.estado === 'true',
            chk_limpieza: document.getElementById('chk_s_limpieza').dataset.estado === 'true',
            chk_guardafangos: document.getElementById('chk_s_guardafangos').dataset.estado === 'true',
            chk_capo: document.getElementById('chk_s_capo').dataset.estado === 'true',
            chk_cinturon: document.getElementById('chk_s_cinturon').dataset.estado === 'true'
        };
        try {
            const res = await fetch(`${API_URL}/registrar-salida`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { alert("✅ Salida registrada."); document.getElementById('formSalida').reset(); document.getElementById('caja_origen_detalle').style.display = 'none'; generarGridChecklist('grid_salida', 's'); inicializarGarita(); }
        } catch (error) { alert("Error"); } finally { btn.innerText = "Dar Salida de Garita"; }
    });

    document.getElementById('formRetorno').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnRetorno'); btn.innerText = "Procesando...";
        const payload = {
            movimiento_id: document.getElementById('r_viaje').value,
            vehiculo_id: document.getElementById('r_vehiculo_id').value,
            km_retorno: parseInt(document.getElementById('r_km').value),
            combustible_retorno: parseInt(document.getElementById('r_combustible').value),
            reporta_gastos: document.getElementById('r_gastos').checked,
            detalle_gastos: document.getElementById('r_detalle_gastos').value,
            observaciones_retorno: document.getElementById('r_obs').value,
            estado_llegada: document.getElementById('r_taller').checked ? 144280002 : 144280000,
            motivo_taller: document.getElementById('r_motivo_taller').value,
            chk_brisas: document.getElementById('chk_r_brisas').dataset.estado === 'true',
            chk_parachoques: document.getElementById('chk_r_parachoques').dataset.estado === 'true',
            chk_llantas: document.getElementById('chk_r_llantas').dataset.estado === 'true',
            chk_puertas: document.getElementById('chk_r_puertas').dataset.estado === 'true',
            chk_luces: document.getElementById('chk_r_luces').dataset.estado === 'true',
            chk_bocina: document.getElementById('chk_r_bocina').dataset.estado === 'true',
            chk_maletero: document.getElementById('chk_r_maletero').dataset.estado === 'true',
            chk_lunas: document.getElementById('chk_r_lunas').dataset.estado === 'true',
            chk_limpieza: document.getElementById('chk_r_limpieza').dataset.estado === 'true',
            chk_guardafangos: document.getElementById('chk_r_guardafangos').dataset.estado === 'true',
            chk_capo: document.getElementById('chk_r_capo').dataset.estado === 'true',
            chk_cinturon: document.getElementById('chk_r_cinturon').dataset.estado === 'true'
        };
        
        if (!payload.chk_brisas || !payload.chk_llantas || !payload.chk_luces || !payload.chk_bocina) { payload.estado_llegada = 144280002; }

        try {
            const res = await fetch(`${API_URL}/registrar-retorno`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { alert("🏁 Retorno registrado."); document.getElementById('formRetorno').reset(); document.getElementById('caja_gastos').style.display = 'none'; document.getElementById('caja_motivo_taller').style.display = 'none'; generarGridChecklist('grid_retorno', 'r'); inicializarGarita(); }
        } catch (error) { alert("Error"); } finally { btn.innerText = "Registrar Retorno a Base"; }
    });

    // LÓGICA DE CARGA SECUENCIAL PARA EVITAR ERROR DE PLACA [S/P]
    async function inicializarGarita() {
        await cargarVehiculos();
        await cargarViajes();
        await cargarConductores();
    }
    inicializarGarita();
</script>

</body>
</html>
