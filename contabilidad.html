<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad - Grupo Aurica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --aurica-blue: #305da0;
            --aurica-bg: #eceded;
            --text-dark: #2c3e50;
            --info-color: #17a2b8;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--aurica-bg); margin: 0; padding: 20px; color: var(--text-dark); }
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; max-width: 1200px; margin: auto; }
        
        .top-bar { display: flex; align-items: center; gap: 15px; background: var(--aurica-blue); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; max-width: 1200px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 10px rgba(48, 93, 160, 0.2);}
        .top-bar h2 { margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px;}
        .top-bar p { margin: 3px 0 0 0; font-size: 13px; font-weight: 400; opacity: 0.9;}

        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .card h3 { margin-top: 0; color: var(--aurica-blue); border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; font-weight: 900;}
        
        /* ALERTAS */
        .gasto-item { background: #f8f9fa; border: 2px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s;}
        .gasto-item:hover { border-color: var(--aurica-blue); background: white;}
        .gasto-item.selected { border-color: var(--aurica-blue); background: #f0f4f8; box-shadow: 0 4px 10px rgba(48,93,160,0.1);}
        .g-monto { font-size: 18px; font-weight: 900; color: var(--info-color); margin-top: 5px;}
        .g-fecha { font-size: 12px; color: #666; font-weight: 600;}

        /* FORMULARIOS */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: var(--text-dark); font-size: 13px;}
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; font-size: 14px;}
        input:focus, select:focus { border-color: var(--aurica-blue); outline: none;}
        
        button { background: var(--aurica-blue); color: white; border: none; padding: 15px; width: 100%; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.2s;}
        button:hover { background: #264b82; }
        .btn-secundario { background: #6c757d; padding: 12px; font-size: 13px; margin-bottom: 20px;}
        
        .empty-state { text-align: center; color: #888; padding: 30px; font-weight: 600;}
    </style>
</head>
<body>

<div class="top-bar">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    <div>
        <h2>Auditoría y Cumplimiento</h2>
        <p>Validación SUNAT - Gastos de Ruta</p>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>📄 Gastos por Validar</h3>
        <button class="btn-secundario" onclick="cargarGastosPendientes()">Actualizar Lista</button>
        <div id="listaGastos"><div class="empty-state">Buscando...</div></div>
    </div>

    <div class="card">
        <h3>✒️ Registro Fiscal</h3>
        <form id="formContabilidad">
            <input type="hidden" id="gasto_id">
            
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Nº Comprobante (Factura/Boleta)</label>
                    <input type="text" id="num_comprobante" placeholder="Ej. F001-004589" required>
                </div>
                <div class="form-group">
                    <label>Validación Fiscal</label>
                    <select id="estado_validacion" required>
                        <option value="">Seleccione...</option>
                        <option value="144280001">Aprobado (Crédito Fiscal)</option>
                        <option value="144280002">Rechazado (Gasto No Deducible)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Cantidad de Galones (Solo Combustible)</label>
                <input type="number" id="cantidad_galones" step="0.01" placeholder="Ej. 12.5 (Dejar vacío si es peaje/taller)">
            </div>

            <button type="submit" id="btnGuardarContabilidad">Registrar en Libro Mayor</button>
            <div id="msjContabilidad" style="margin-top:15px; text-align:center; font-weight:800; font-size:14px;"></div>
        </form>
    </div>
</div>

<!-- ================== SCRIPT INTACTO ================== -->
<script>
    async function cargarGastosPendientes() {
        const lista = document.getElementById('listaGastos');
        lista.innerHTML = '<div class="empty-state">Cargando...</div>';
        try {
            const res = await fetch('http://localhost:8000/gastos-pendientes');
            const data = await res.json();
            
            if(data.data.length === 0) { lista.innerHTML = '<div class="empty-state">✅ Todo validado.</div>'; return; }

            lista.innerHTML = '';
            data.data.forEach(g => {
                let tipoStr = "Gasto";
                if(g.cr596_tipogasto === 144280000) tipoStr = "Combustible";
                if(g.cr596_tipogasto === 144280001) tipoStr = "Peaje";

                lista.innerHTML += `
                    <div class="gasto-item" onclick="seleccionarGasto('${g.cr596_flota_gastorutaid}', this)">
                        <div class="g-fecha">${tipoStr} - Pendiente de Auditoría</div>
                        <div class="g-monto">S/ ${g.cr596_monto || "0.00"}</div>
                    </div>
                `;
            });
        } catch(e) {}
    }

    function seleccionarGasto(id, element) {
        document.querySelectorAll('.gasto-item').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('gasto_id').value = id;
    }

    document.getElementById('formContabilidad').addEventListener('submit', async (e) => {
        e.preventDefault();
        const gasto_id = document.getElementById('gasto_id').value;
        if(!gasto_id) { alert("⚠️ Seleccione un gasto pendiente de la lista."); return; }

        const msj = document.getElementById('msjContabilidad');
        const btn = document.getElementById('btnGuardarContabilidad');
        btn.innerText = "Guardando..."; msj.innerText = "";
        
        let galones = parseFloat(document.getElementById('cantidad_galones').value);
        if(isNaN(galones)) galones = null;

        const payload = {
            gasto_id: gasto_id,
            estado_validacion: parseInt(document.getElementById('estado_validacion').value),
            numero_comprobante: document.getElementById('num_comprobante').value,
            cantidad_galones: galones
        };

        try {
            const res = await fetch('http://localhost:8000/contabilizar-gasto', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { msj.innerText = "✅ Gasto contabilizado."; msj.style.color = "green"; document.getElementById('formContabilidad').reset(); cargarGastosPendientes();
            } else { msj.innerText = "❌ Error en el servidor."; msj.style.color = "red"; }
        } catch (error) { msj.innerText = "❌ Error de conexión."; msj.style.color = "red"; }
        finally { btn.innerText = "Registrar en Libro Mayor"; }
    });

    cargarGastosPendientes();
</script>
</body>
</html>
